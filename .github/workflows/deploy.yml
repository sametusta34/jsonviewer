name: Deploy to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone main (with token)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} . --depth 1
          git checkout main

      - name: Setup Node 20 (no actions/setup-node)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get update
          sudo apt-get install -y nodejs
          node -v
          npm -v

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages (no actions/checkout)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          git config user.email "bot@github.com"
          git config user.name "GitHub Bot"

          # dist var mı?
          if [ ! -d "dist" ]; then
            echo "HATA: dist/ bulunamadı. Build başarısız."
            ls -la
            exit 1
          fi

          # dist'i geçici yere taşı (temizlik silmesin)
          rm -rf /tmp/dist
          mv dist /tmp/dist

          # gh-pages branch hazırlığı
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # gh-pages içeriğini temizle
          find . -maxdepth 1 -mindepth 1 ! -name '.git' -exec rm -rf {} +

          # dist'i geri getir ve root'a kopyala
          mv /tmp/dist dist
          cp -r dist/. .
          rm -rf dist

          touch .nojekyll

          git add -A
          git commit -m "Deploy to gh-pages" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages